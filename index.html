<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorShift AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg: #f5f0eb; --surface: #ffffff; --surface2: #f0ebe4;
  --ink: #1a1410; --muted: #9a8f85; --accent: #e85d3a;
  --accent2: #2d6a4f; --accent3: #6b4fbb;
  --border: rgba(26,20,16,0.1); --r: 20px;
  --shadow: 0 4px 24px rgba(26,20,16,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; }
header { background:var(--ink); padding:18px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.brand { display:flex; align-items:center; gap:12px; }
.brand-dot { width:38px; height:38px; border-radius:12px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:20px; }
.brand-name { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:#fff; }
.brand-name span { color:var(--accent); }
.header-tag { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); font-size:12px; padding:4px 12px; border-radius:100px; }
.layout { display:grid; grid-template-columns:320px 1fr; min-height:calc(100vh - 74px); }
@media(max-width:800px){ .layout { grid-template-columns:1fr; } }
.sidebar { background:var(--surface); border-right:1px solid var(--border); padding:24px 18px; overflow-y:auto; display:flex; flex-direction:column; gap:18px; }
.panel { background:var(--surface2); border-radius:var(--r); padding:18px; border:1px solid var(--border); }
.panel-title { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
.color-item { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.color-item:last-child { margin-bottom:0; }
.color-label { font-size:14px; font-weight:500; display:flex; align-items:center; gap:8px; }
.color-controls { display:flex; align-items:center; gap:8px; }
input[type=color] { width:36px; height:36px; border:2px solid var(--border); border-radius:10px; cursor:pointer; padding:2px; }
.ctoggle { width:36px; height:36px; border-radius:10px; border:2px solid var(--border); background:var(--surface); cursor:pointer; font-size:14px; transition:all .2s; display:flex; align-items:center; justify-content:center; }
.ctoggle.on { background:var(--ink); border-color:var(--ink); color:#fff; }
.slider-wrap { margin-top:12px; }
.slider-label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:6px; }
input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; }
.prompt-area { width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:12px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink); resize:vertical; min-height:80px; outline:none; transition:border-color .2s; }
.prompt-area:focus { border-color:var(--accent); }
.btn { width:100%; padding:14px; border-radius:14px; border:none; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn:disabled { opacity:.4; cursor:not-allowed; }
.btn-fire { background:var(--accent); color:#fff; box-shadow:0 6px 20px rgba(232,93,58,0.35); }
.btn-fire:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 8px 28px rgba(232,93,58,0.5); }
.btn-dark { background:var(--ink); color:#fff; }
.btn-outline { background:transparent; border:2px solid var(--border); color:var(--ink); width:auto; padding:9px 16px; font-size:13px; }
.btn-green { background:var(--accent2); color:#fff; }
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.stat-card { background:var(--surface); border-radius:14px; padding:14px; border:1px solid var(--border); text-align:center; }
.stat-num { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; }
.stat-num.o { color:var(--accent); } .stat-num.g { color:var(--accent2); } .stat-num.p { color:var(--accent3); }
.stat-label { font-size:11px; color:var(--muted); margin-top:2px; }
.main { padding:28px; overflow-y:auto; display:flex; flex-direction:column; gap:22px; }
.upload-zone { border:2.5px dashed rgba(232,93,58,0.3); border-radius:28px; padding:56px 24px; text-align:center; background:radial-gradient(ellipse at 50% 0%, rgba(232,93,58,0.05) 0%, transparent 70%); transition:all .3s; cursor:pointer; }
.upload-zone:hover, .upload-zone.drag { border-color:var(--accent); background:radial-gradient(ellipse at 50% 0%, rgba(232,93,58,0.1) 0%, transparent 70%); }
.upload-zone.hidden { display:none; }
.uz-icon { font-size:56px; display:block; margin-bottom:14px; animation:float 4s ease-in-out infinite; }
.uz-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; margin-bottom:8px; }
.uz-sub { color:var(--muted); font-size:14px; margin-bottom:24px; }
label.ubtn { display:inline-flex; align-items:center; gap:8px; background:var(--ink); color:#fff; padding:13px 28px; border-radius:12px; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; }
label.ubtn:hover { background:#2d2520; transform:translateY(-1px); }
input[type=file] { display:none; }
.photos-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.photos-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; }
.photos-title span { color:var(--accent); }
.photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; }
@media(max-width:500px){ .photo-grid { grid-template-columns:repeat(2,1fr); } }
.photo-card { background:var(--surface); border-radius:16px; border:1.5px solid var(--border); overflow:hidden; transition:all .2s; position:relative; box-shadow:var(--shadow); }
.photo-card:hover { transform:translateY(-3px); }
.photo-card img { width:100%; aspect-ratio:1; object-fit:cover; display:block; }
.photo-card-footer { padding:9px 11px; display:flex; align-items:center; justify-content:space-between; }
.photo-name { font-size:11px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100px; }
.photo-status { font-size:11px; font-weight:600; padding:3px 8px; border-radius:100px; }
.sw { background:rgba(154,143,133,0.15); color:var(--muted); }
.sp { background:rgba(232,93,58,0.12); color:var(--accent); }
.sd { background:rgba(45,106,79,0.12); color:var(--accent2); }
.se { background:rgba(220,50,50,0.12); color:#dc3232; }
.photo-remove { position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:50%; background:rgba(26,20,16,0.6); color:#fff; border:none; cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; }
.photo-card:hover .photo-remove { opacity:1; }
.dl-btn { position:absolute; bottom:42px; left:50%; transform:translateX(-50%); background:var(--accent); color:#fff; border:none; padding:7px 14px; border-radius:8px; cursor:pointer; font-family:'Syne',sans-serif; font-size:11px; font-weight:700; opacity:0; transition:opacity .2s; white-space:nowrap; z-index:5; }
.photo-card:hover .dl-btn { opacity:1; }
.proc-overlay { position:absolute; inset:0; background:rgba(255,255,255,0.88); display:none; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.proc-overlay.show { display:flex; }
.spinner { width:30px; height:30px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
.prog-wrap { background:rgba(26,20,16,0.08); border-radius:100px; height:6px; overflow:hidden; margin-top:8px; }
.prog-fill { height:100%; background:var(--accent); border-radius:100px; transition:width .3s; width:0%; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.anim { animation:fadeIn .4s ease both; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-dot">🎨</div>
    <div class="brand-name">Color<span>Shift</span> AI</div>
  </div>
  <span class="header-tag">Powered by Claude AI — Free</span>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="panel">
      <div class="panel-title">🎨 Color Settings</div>
      <div class="color-item">
        <div class="color-label">👕 Clothes</div>
        <div class="color-controls">
          <input type="color" id="clothesColor" value="#e63946">
          <div class="ctoggle on" id="clothesToggle" onclick="toggle('clothes')">✓</div>
        </div>
      </div>
      <div class="color-item">
        <div class="color-label">🧴 Skin Tone</div>
        <div class="color-controls">
          <input type="color" id="skinColor" value="#c68642">
          <div class="ctoggle on" id="skinToggle" onclick="toggle('skin')">✓</div>
        </div>
      </div>
      <div class="color-item">
        <div class="color-label">🖼️ Background</div>
        <div class="color-controls">
          <input type="color" id="bgColor" value="#457b9d">
          <div class="ctoggle on" id="bgToggle" onclick="toggle('bg')">✓</div>
        </div>
      </div>
      <div class="slider-wrap">
        <div class="slider-label"><span>Intensity</span><span id="intVal">80%</span></div>
        <input type="range" id="intensity" min="1" max="100" value="80" oninput="document.getElementById('intVal').textContent=this.value+'%'">
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">✏️ Custom Instructions (optional)</div>
      <textarea class="prompt-area" id="customPrompt" placeholder="e.g. Make the dress red, warm golden skin, soft blue background..."></textarea>
    </div>
    <button class="btn btn-fire" id="processBtn" onclick="processAll()" disabled>🚀 Process All Photos</button>
    <button class="btn btn-dark" onclick="downloadAll()" id="downloadBtn" style="display:none">⬇️ Download All (ZIP)</button>
    <div class="stats" id="statsPanel" style="display:none">
      <div class="stat-card"><div class="stat-num o" id="sTotal">0</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num g" id="sDone">0</div><div class="stat-label">Done</div></div>
      <div class="stat-card"><div class="stat-num p" id="sLeft">0</div><div class="stat-label">Left</div></div>
    </div>
  </aside>
  <main class="main">
    <div class="upload-zone anim" id="uploadZone">
      <span class="uz-icon">🖼️</span>
      <div class="uz-title">Drop your photos here</div>
      <div class="uz-sub">Upload 20+ photos — AI changes clothes, skin & background colors</div>
      <label class="ubtn" for="fileInput">📂 Choose Photos</label>
      <input type="file" id="fileInput" accept="image/*" multiple>
    </div>
    <div id="photosSection" style="display:none" class="anim">
      <div class="photos-header">
        <div class="photos-title"><span id="photoCount">0</span> Photos Ready</div>
        <div style="display:flex;gap:10px">
          <label class="btn-outline btn" for="fileInput" style="cursor:pointer;font-family:Syne,sans-serif;font-weight:700;font-size:13px">+ Add More</label>
          <button class="btn-outline btn" style="cursor:pointer;font-family:Syne,sans-serif;font-weight:700;font-size:13px" onclick="clearAll()">🗑 Clear</button>
        </div>
      </div>
      <div id="progressWrap" style="display:none;margin-top:8px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
          <span id="progLabel">Processing...</span><span id="progPct">0%</span>
        </div>
        <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
      </div>
      <div class="photo-grid" id="photoGrid"></div>
    </div>
  </main>
</div>
<script>
let photos=[], busy=false;
document.getElementById('fileInput').onchange=e=>{addFiles(Array.from(e.target.files));e.target.value='';};
const zone=document.getElementById('uploadZone');
['dragenter','dragover'].forEach(ev=>zone.addEventListener(ev,e=>{e.preventDefault();zone.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>zone.addEventListener(ev,e=>{e.preventDefault();zone.classList.remove('drag');}));
zone.addEventListener('drop',e=>addFiles(Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'))));
function addFiles(files){files.forEach(f=>{const r=new FileReader();r.onload=e=>{photos.push({file:f,name:f.name,dataURL:e.target.result,status:'wait',result:null});render();};r.readAsDataURL(f);});}
function render(){
  zone.classList.add('hidden');
  document.getElementById('photosSection').style.display='block';
  document.getElementById('photoCount').textContent=photos.length;
  document.getElementById('processBtn').disabled=photos.length===0||busy;
  document.getElementById('statsPanel').style.display=photos.length?'grid':'none';
  document.getElementById('sTotal').textContent=photos.length;
  document.getElementById('sDone').textContent=photos.filter(p=>p.status==='done').length;
  document.getElementById('sLeft').textContent=photos.filter(p=>p.status==='wait'||p.status==='proc').length;
  document.getElementById('downloadBtn').style.display=photos.some(p=>p.status==='done')?'flex':'none';
  const g=document.getElementById('photoGrid');g.innerHTML='';
  photos.forEach((p,i)=>{
    const sc={wait:'sw',proc:'sp',done:'sd',err:'se'}[p.status];
    const st={wait:'Waiting',proc:'Processing...',done:'Done ✓',err:'Error'}[p.status];
    const c=document.createElement('div');c.className='photo-card';
    c.innerHTML=`<img src="${p.result||p.dataURL}" alt=""><button class="photo-remove" onclick="rm(${i})">✕</button><div class="photo-card-footer"><span class="photo-name">${p.name}</span><span class="photo-status ${sc}">${st}</span></div><div class="proc-overlay${p.status==='proc'?' show':''}"><div class="spinner"></div><span style="font-size:11px;color:var(--muted)">AI Working...</span></div>`;
    if(p.result){const b=document.createElement('button');b.className='dl-btn';b.textContent='⬇️ Download';b.onclick=()=>dl(p,i);c.appendChild(b);}
    g.appendChild(c);
  });
}
function rm(i){photos.splice(i,1);if(!photos.length){zone.classList.remove('hidden');document.getElementById('photosSection').style.display='none';}else render();}
function clearAll(){photos=[];zone.classList.remove('hidden');document.getElementById('photosSection').style.display='none';document.getElementById('processBtn').disabled=true;}
function toggle(t){const b=document.getElementById(t+'Toggle');b.classList.toggle('on');b.textContent=b.classList.contains('on')?'✓':'○';}
function isOn(t){return document.getElementById(t+'Toggle').classList.contains('on');}
function buildFilter(){
  const c=document.getElementById('clothesColor').value;
  const s=document.getElementById('skinColor').value;
  const b=document.getElementById('bgColor').value;
  const int=parseInt(document.getElementById('intensity').value)/100;
  // Build CSS filter based on selected colors
  let hue=0, sat=1, bright=1;
  if(isOn('clothes')){const rgb=hexToHsl(c);hue=rgb[0];sat=0.8+int*0.7;bright=0.9+int*0.2;}
  if(isOn('skin')){bright=bright*(0.9+int*0.15);}
  const filters=[];
  if(hue!==0) filters.push(`hue-rotate(${Math.round(hue)}deg)`);
  filters.push(`saturate(${sat.toFixed(2)})`);
  filters.push(`brightness(${bright.toFixed(2)})`);
  if(isOn('bg')) filters.push(`contrast(${0.9+int*0.15})`);
  return filters.join(' ');
}
function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);let h=0;
  if(max!==min){if(max===r)h=((g-b)/(max-min))%6;else if(max===g)h=(b-r)/(max-min)+2;else h=(r-g)/(max-min)+4;h=Math.round(h*60);if(h<0)h+=360;}
  return [h,(max-min)*100,(max+min)/2*100];
}
async function processAll(){
  if(busy)return; busy=true;
  document.getElementById('processBtn').disabled=true;
  document.getElementById('progressWrap').style.display='block';
  const prompt=buildPrompt();
  let done=0;
  for(let i=0;i<photos.length;i++){
    if(photos[i].status==='done'){done++;continue;}
    photos[i].status='proc';render();
    try{
      const result=await processOne(photos[i],prompt);
      photos[i].result=result;photos[i].status='done';
    }catch(e){photos[i].status='err';console.error(e);}
    done++;
    const pct=Math.round((done/photos.length)*100);
    document.getElementById('progFill').style.width=pct+'%';
    document.getElementById('progPct').textContent=pct+'%';
    document.getElementById('progLabel').textContent=`Processing ${done} of ${photos.length}...`;
    render();
  }
  busy=false;
  document.getElementById('processBtn').disabled=false;
  document.getElementById('progLabel').textContent='✅ All done!';
}
function buildPrompt(){
  const custom=document.getElementById('customPrompt').value.trim();
  if(custom)return custom;
  const parts=[];
  if(isOn('clothes'))parts.push(`clothes color to ${document.getElementById('clothesColor').value}`);
  if(isOn('skin'))parts.push(`skin/face tone to ${document.getElementById('skinColor').value}`);
  if(isOn('bg'))parts.push(`background color to ${document.getElementById('bgColor').value}`);
  return `Change: ${parts.join(', ')}. Intensity: ${document.getElementById('intensity').value}%. Return ONLY JSON: {"css_filter":"hue-rotate(Xdeg) saturate(X) brightness(X) contrast(X)"}`;
}
async function processOne(photo,prompt){
  const b64=photo.dataURL.split(',')[1];
  const mt=photo.file.type||'image/jpeg';
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:200,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mt,data:b64}},
        {type:'text',text:prompt+'\n\nAnalyze the image colors and return ONLY a JSON object with a css_filter string that best approximates the requested color changes. Example: {"css_filter":"hue-rotate(120deg) saturate(1.4) brightness(1.05)"}. No other text.'}
      ]}]
    })
  });
  const data=await res.json();
  const txt=data.content?.[0]?.text||'{}';
  let parsed={};
  try{parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());}catch(e){parsed={css_filter:buildFilter()};}
  return applyCSS(photo.dataURL,parsed.css_filter||buildFilter());
}
function applyCSS(src,filter){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
      const ctx=c.getContext('2d');ctx.filter=filter;ctx.drawImage(img,0,0);
      res(c.toDataURL('image/jpeg',0.92));
    };img.src=src;
  });
}
function dl(p){const a=document.createElement('a');a.href=p.result;a.download='colorshift_'+p.name;a.click();}
async function downloadAll(){
  const done=photos.filter(p=>p.status==='done');if(!done.length)return;
  const btn=document.getElementById('downloadBtn');btn.textContent='⏳ Zipping...';btn.disabled=true;
  const zip=new JSZip(),folder=zip.folder('colorshift');
  done.forEach(p=>folder.file('colorshift_'+p.name,p.result.split(',')[1],{base64:true}));
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='colorshift_results.zip';a.click();
  btn.textContent='⬇️ Download All (ZIP)';btn.disabled=false;
}
</script>
</body>
</html>
